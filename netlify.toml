# Build depuis le sous-dossier frontend (SPA Vite + React Router)
[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

# Évite un 404 sur la requête implicite du navigateur (icône /favicon.png)
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.png"
  status = 200

# SPA : toutes les routes client (/movies, /movies/1, etc.) servent index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
