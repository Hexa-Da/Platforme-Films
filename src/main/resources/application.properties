# Default profile
spring.profiles.active=dev

# Swagger
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
springdoc.swagger-ui.path=/docs

# JPA
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction}
jwt.expiration=86400000

# Frontend base URL for OAuth2 redirects
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}

# Seed données de démo (films + avis fictifs) — désactivé en prod via application-prod.properties
app.seed.demo-movies.enabled=${APP_SEED_DEMO_MOVIES_ENABLED:true}
app.seed.demo-reviews.enabled=${APP_SEED_DEMO_REVIEWS_ENABLED:true}