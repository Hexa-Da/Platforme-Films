# MySQL for production
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/movies_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
app.frontend.base-url=${FRONTEND_BASE_URL}

# OAuth2 Google (production)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

jwt.secret=${JWT_SECRET}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173}